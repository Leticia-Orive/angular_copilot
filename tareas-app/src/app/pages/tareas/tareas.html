<div class="container">
  <!-- Título principal de la pantalla -->
  <h1>Mis tareas</h1>

  <!-- Formulario de alta de tareas -->
  <div class="form">
    <input
      type="text"
      placeholder="Escribe una tarea…"
      [(ngModel)]="titulo"
      (keyup.enter)="agregar()"
    />
    <select [(ngModel)]="categoria" aria-label="Categoría">
      <option *ngFor="let item of categorias" [value]="item">{{ item }}</option>
    </select>
    <input type="date" [(ngModel)]="fecha" aria-label="Fecha" />
    <input type="datetime-local" [(ngModel)]="recordatorio" aria-label="Recordatorio" />
    <button (click)="agregar()">Agregar</button>
  </div>

  <!-- Calendario mensual con tareas por día -->
  <section class="calendario" *ngIf="tareas.length">
    <!-- Navegación del mes actual -->
    <div class="cal-header">
      <button type="button" (click)="cambiarMes(-1)">‹</button>
      <h2>{{ tituloMes }}</h2>
      <button type="button" (click)="cambiarMes(1)">›</button>
    </div>

    <div class="cal-grid cal-weekdays">
      <div class="cal-cell day-name" *ngFor="let dia of diasSemana">{{ dia }}</div>
    </div>

    <!-- Leyenda visual de colores por categoría -->
    <div class="leyenda-colores">
      <span class="leyenda-item" *ngFor="let item of leyendaCategorias">
        <span class="dot" [ngClass]="item.clase"></span>
        {{ item.nombre }}
      </span>
    </div>

    <div class="cal-grid">
      <div class="cal-cell" *ngFor="let celda of celdasCalendario" [class.empty]="!celda.dia">
        <ng-container *ngIf="celda.dia">
          <span class="day-number">{{ celda.dia }}</span>
          <!-- Tareas del día; clic en tarea para abrir/gestionar -->
          <ul class="day-tasks" *ngIf="celda.tareas.length">
            <li
              *ngFor="let t of celda.tareas"
              [ngClass]="[
                claseCategoria(t.categoria),
                t.completada ? 'done-task' : '',
                t.finalizadaPorDia && !t.completada ? 'day-done-task' : ''
              ]"
              (click)="abrirTareaDesdeCalendario(t.id)"
            >
              <span>{{ t.titulo }} ({{ t.categoria }})</span>
              <!-- Evita abrir la tarea al pulsar eliminar -->
              <button
                type="button"
                class="delete-cal"
                aria-label="Borrar tarea"
                (click)="$event.stopPropagation(); pedirConfirmacionEliminar(t)"
              >
                ✕
              </button>
            </li>
          </ul>
        </ng-container>
      </div>
    </div>
  </section>

  <!-- Listado principal agrupado por categoría -->
  <div *ngIf="tareas.length; else vacio">
    <section class="grupo" *ngFor="let grupo of tareasPorCategoria | keyvalue">
      <h2>{{ grupo.key }}</h2>

      <ul class="lista">
        <li
          *ngFor="let t of grupo.value"
          [class.done]="t.completada"
          [class.day-done]="t.finalizadaPorDia && !t.completada"
        >
          <label>
            <input
              type="checkbox"
              [checked]="t.completada"
              (change)="marcarComoRealizada(t.id)"
            />
            <span>
              {{ t.titulo }}
              <small class="estado-dia" *ngIf="t.finalizadaPorDia && !t.completada">
                Finalizada por hoy
              </small>
              <small class="recordatorio" *ngIf="t.recordatorio">
                🔔 {{ textoRecordatorio(t.recordatorio) }}
              </small>
            </span>
          </label>
          <button
            class="finish-day"
            type="button"
            *ngIf="!t.completada && !t.finalizadaPorDia"
            (click)="marcarComoFinalizadaPorDia(t.id)"
          >
            Finalizar por hoy
          </button>
          <!-- Botón para solicitar confirmación antes de borrar -->
          <button class="delete" (click)="pedirConfirmacionEliminar(t)">✕</button>
        </li>
      </ul>
    </section>
  </div>

  <!-- Estado vacío cuando no hay tareas -->
  <ng-template #vacio>
    <p class="hint">No hay tareas aún. Agrega la primera 👇</p>
  </ng-template>

  <!-- Modal de confirmación de eliminación -->
  <div class="modal-overlay" *ngIf="tareaPendienteEliminar">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="titulo-confirmar-eliminar">
      <h3 id="titulo-confirmar-eliminar">¿Quieres borrar esta tarea?</h3>
      <p>{{ tareaPendienteEliminar.titulo }}</p>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="cancelarEliminacion()">Cancelar</button>
        <button type="button" class="btn-delete" (click)="confirmarEliminacion()">Eliminar</button>
      </div>
    </div>
  </div>
</div>
